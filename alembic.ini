# =============================================================================
# Alembic Configuration — Dự án dự báo giá cổ phiếu & crypto
# =============================================================================
# sqlalchemy.url sẽ được override bởi migrations/env.py (đọc từ shared.config.settings)

[alembic]
script_location = migrations
prepend_sys_path = .
# Placeholder — env.py sẽ override bằng DATABASE_URL từ .env
sqlalchemy.url = postgresql+psycopg2://postgres:postgres@localhost:5432/stock_crypto_db

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
