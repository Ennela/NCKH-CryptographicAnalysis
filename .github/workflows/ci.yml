name: Continuous Integration

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  lint-and-format:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-python-version: '3.11'

      - name: Install Linting Tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run Ruff Linter
        run: ruff check .

      - name: Run Ruff Formatter Check
        run: ruff format --check .

  pytest:
    name: Python Tests
    runs-on: ubuntu-latest
    needs: lint-and-format
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install shared package first in editable mode
          pip install -e ./shared
          # Install other services requirements for testing purposes
          if [ -f services/ingestion/requirements.txt ]; then pip install -r services/ingestion/requirements.txt; fi
          if [ -f services/training/requirements.txt ]; then pip install -r services/training/requirements.txt; fi
          if [ -f services/inference/requirements.txt ]; then pip install -r services/inference/requirements.txt; fi
          pip install pytest pytest-mock httpx

      - name: Run Pytest
        run: |
          python -m pytest --disable-warnings

  docker-build-check:
    name: Docker Compose Dry Run
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Copy Env Example
        run: cp .env.example .env

      - name: Check Compose Syntax
        run: |
          docker compose config
