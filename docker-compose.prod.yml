version: '3.8'

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: forecast_postgres_prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-stock_crypto_db}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stock_crypto_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: forecast_redis_prod
    restart: always
    volumes:
      - redis_prod_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.3
    container_name: forecast_mlflow_prod
    restart: always
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db --default-artifact-root /mlflow/artifacts
    volumes:
      - mlflow_prod_data:/mlflow

  ingestion:
    build:
      context: .
      dockerfile: services/ingestion/Dockerfile
    container_name: forecast_ingestion_prod
    restart: always
    environment:
      - ENV=production
      - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - SENTRY_DSN=${SENTRY_DSN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  training:
    build:
      context: .
      dockerfile: services/training/Dockerfile
    container_name: forecast_training_prod
    restart: on-failure
    environment:
      - ENV=production
      - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - SENTRY_DSN=${SENTRY_DSN}
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_healthy

  inference:
    build:
      context: .
      dockerfile: services/inference/Dockerfile
    container_name: forecast_inference_prod
    restart: always
    environment:
      - ENV=production
      - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - API_KEY_SECRET=${API_KEY_SECRET}
      - SENTRY_DSN=${SENTRY_DSN}
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mlflow:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=/api/v1
    container_name: forecast_frontend_prod
    restart: always
    environment:
      - NODE_ENV=production
    expose:
      - "3000"
    depends_on:
      - inference

  nginx:
    image: nginx:alpine
    container_name: forecast_nginx_prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - inference

volumes:
  postgres_prod_data:
  redis_prod_data:
  mlflow_prod_data:
